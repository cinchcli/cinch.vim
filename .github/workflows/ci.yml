name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install vint
        run: pip install vim-vint

      - name: Run vint
        run: vint plugin/

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Vim
        run: sudo apt-get update && sudo apt-get install -y vim

      - name: Source plugin (verify it loads without error)
        run: |
          vim -E -s -u NONE -N \
              -c 'set runtimepath+=.' \
              -c 'runtime plugin/cinch.vim' \
              -c 'echo "loaded ok"' \
              -c 'qa!' \
              < /dev/null
